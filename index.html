<!DOCTYPE html>

<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Glitery Dust - Beauty Store</title>

<link rel="stylesheet" href="style.css">

<style>
body{
font-family: Arial, sans-serif;
background:#fff0f6;
margin:0;
text-align:center;
}

header{
background:#ff4da6;
color:white;
padding:20px;
}

.products{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:20px;
}

.product{
width:220px;
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.product img{
width:100%;
height:200px;
object-fit:cover;
border-radius:10px;
}

.price{
font-weight:bold;
color:#ff4da6;
}

button{
margin:5px;
padding:8px 12px;
border:none;
border-radius:5px;
background:#ff4da6;
color:white;
cursor:pointer;
}

button:hover{
background:#e60073;
}
</style>

</head>

<body>

<header>
<h1>💄 Glitery Dust</h1>
<p>Your Beauty, Our Passion</p>
</header>

<h2>Our Products</h2>

<div id="product-list" class="products"></div>

<script src="script.js"></script>

</body>

</html>
<div id="product-list"></div>
